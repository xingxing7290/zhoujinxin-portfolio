name: CI and container release

on:
  pull_request:
  push:
    branches: [main, "codex/**"]
    tags: ["v*"]

permissions:
  contents: read

env:
  REGISTRY_IMAGE: ghcr.io/xingxing7290/zhoujinxin-portfolio

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.12"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: test -z "$(gofmt -l cmd internal)"
      - run: go test ./...
      - run: go vet ./...
      - run: sh tests/deploy-script.sh

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.12"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.12"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Start test server
        env:
          PORT: "8099"
          BASE_URL: http://127.0.0.1:8099
          DATA_DIR: ./data/lighthouse
          ADMIN_USERNAME: admin
          ADMIN_INITIAL_PASSWORD: Lighthouse-Temporary-2026!
          SECURE_COOKIES: "false"
        run: |
          go run ./cmd/server > /tmp/portfolio.log 2>&1 &
          for attempt in $(seq 1 60); do
            curl --fail --silent http://127.0.0.1:8099/api/health && exit 0
            sleep 2
          done
          cat /tmp/portfolio.log
          exit 1
      - run: npx --yes @lhci/cli@0.14.0 autorun --config=lighthouserc.json

  container:
    needs: [checks, browser, lighthouse]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - name: Smoke test packaged static assets
        if: github.event_name != 'pull_request'
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -eu
          image="${REGISTRY_IMAGE}@${IMAGE_DIGEST}"
          name="portfolio-smoke-${GITHUB_RUN_ID}"
          version="$(node -p "require('./package.json').version")"
          docker pull "$image"
          docker run -d --name "$name" -p 127.0.0.1:18080:8080 \
            -e BASE_URL=http://127.0.0.1:18080 \
            -e ADMIN_USERNAME=admin \
            -e ADMIN_INITIAL_PASSWORD='Container-Smoke-Temporary-2026!' \
            "$image"
          trap 'docker rm -f "$name" >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 45); do
            curl --fail --silent http://127.0.0.1:18080/api/health >/dev/null && break
            if [ "$attempt" -eq 45 ]; then
              docker logs "$name"
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18080/ | grep -F "/static/assets/style.css?v=${version}"
          curl --fail --silent "http://127.0.0.1:18080/static/assets/style.css?v=${version}" | grep -F 'html{max-width:100%'
          curl --fail --silent --head "http://127.0.0.1:18080/static/assets/style.css?v=${version}" | grep -i -F 'cache-control: public, max-age=31536000, immutable'
      - name: Attest image provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
